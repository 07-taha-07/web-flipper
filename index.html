<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>FLIPPER NFC DUMP</title>
    <style>
        body { background: #0b0b0b; color: #ff8c00; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .device { border: 4px solid #ff8c00; background: #000; border-radius: 20px; padding: 20px; width: 420px; box-shadow: 0 0 35px rgba(255, 140, 0, 0.4); }
        .screen { border: 2px solid #ff8c00; background: #161616; padding: 15px; height: 280px; overflow-y: auto; margin-bottom: 20px; font-size: 12px; }
        .log { color: #00ff44; margin: 2px 0; white-space: pre-wrap; }
        .header { text-align: center; color: #ffaa00; margin-bottom: 10px; font-weight: bold; }
        button { width: 100%; background: #ff8c00; color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 6px; }
    </style>
</head>
<body>

<div class="device">
    <div class="header">💳 NFC FULL DUMP MODE</div>
    <div class="screen" id="display">
        <div class="log">> Sistem hazır. Kartı yaklaştırın...</div>
    </div>
    <button onclick="dumpCard()">KARTI OKU VE DÖKÜM AL</button>
</div>

<script>
    function print(t) {
        let d = document.getElementById('display');
        let l = document.createElement('div');
        l.className = 'log';
        l.innerText = "> " + t;
        d.appendChild(l);
        d.scrollTop = d.scrollHeight;
    }

    async function dumpCard() {
        print("Okuma başlatılıyor...");
        let uid = Math.floor(Math.random() * 9000000000 + 1000000000).toString(16).toUpperCase();
        
        await new Promise(r => setTimeout(r, 1000));
        print("UID: " + uid);
        print("Tür: MIFARE Classic 1K");
        print("Sektörler okunuyor...");
        
        for(let i=0; i<16; i++) {
            await new Promise(r => setTimeout(r, 150)); // Simüle edilmiş okuma hızı
            let keyA = Math.floor(Math.random() * 9999999999).toString(16).toUpperCase();
            let keyB = Math.floor(Math.random() * 9999999999).toString(16).toUpperCase();
            print(`Sektör ${i}: [KeyA:${keyA}] [KeyB:${keyB}]`);
        }
        
        print("--------------------------");
        print("DÖKÜM TAMAMLANDI: .nfc dosyası kaydedildi.");
    }
</script>
</body>
</html>
