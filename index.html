<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLIPPER REAL TOOLKIT</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: #ff8c00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            user-select: none;
        }
        .flipper-device {
            border: 4px solid #ff8c00;
            background-color: #000;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 0 35px rgba(255, 140, 0, 0.4);
        }
        .flipper-screen {
            border: 2px solid #ff8c00;
            background-color: #161616;
            border-radius: 10px;
            padding: 15px;
            height: 180px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-size: 13px;
            box-shadow: inset 0 0 10px rgba(255, 140, 0, 0.2);
        }
        .screen-title {
            text-align: center;
            font-weight: bold;
            border-bottom: 2px dashed #ff8c00;
            padding-bottom: 5px;
            margin-bottom: 10px;
            color: #ff9d22;
        }
        .terminal-row {
            color: #00ff44;
            margin: 3px 0;
            line-height: 1.4;
        }

        /* İŞLETİM SİSTEMİ SEKMELERİ */
        .os-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            margin-bottom: 20px;
        }
        .menu-btn {
            background-color: #1a1a1a;
            color: #ff8c00;
            border: 1px solid #ff8c00;
            padding: 12px 4px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            border-radius: 4px;
        }
        .menu-btn.active {
            background-color: #ff8c00;
            color: #000;
            box-shadow: 0 0 10px rgba(255, 140, 0, 0.5);
        }

        .module-panel {
            display: none;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 10px;
            background-color: #050505;
        }
        .module-panel.active { display: block; }
        
        h4 { margin: 0 0 12px 0; text-align: center; font-size: 14px; color: #ffaa00; text-transform: uppercase; }
        label { display: block; margin: 10px 0 5px 0; font-size: 12px; font-weight: bold; }
        
        select, input {
            width: 100%;
            padding: 10px;
            background: #111;
            color: #ff8c00;
            border: 1px solid #ff8c00;
            font-family: monospace;
            box-sizing: border-box;
            margin-bottom: 12px;
            border-radius: 4px;
        }

        button.ctrl-btn {
            width: 100%;
            background-color: #ff8c00;
            color: #000;
            border: none;
            padding: 14px;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            border-radius: 6px;
            font-size: 12px;
            text-transform: uppercase;
            margin-top: 5px;
        }
        button.ctrl-btn:active { background-color: #cc7000; }

        /* ÖZEL KARE METADATA GÖRSEL SEÇİM ALANI */
        .image-drop-zone {
            width: 130px;
            height: 130px;
            border: 2px dashed #ff8c00;
            border-radius: 12px;
            margin: 15px auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            background-color: #111;
            overflow: hidden;
            position: relative;
            transition: background 0.2s, border-color 0.2s;
        }
        .image-drop-zone:hover {
            background-color: #1a1a1a;
            border-color: #ffaa00;
        }
        .image-drop-zone span {
            font-size: 11px;
            color: #ff8c00;
            text-align: center;
            padding: 5px;
            pointer-events: none;
        }
        .image-drop-zone img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
        }
    </style>
</head>
<body>

<div class="flipper-device">
    <div class="flipper-screen" id="flipperScreen">
        <div class="screen-title">🐬 FLIPPER REAL-OS v4.0</div>
        <div id="displayLogs">
            <div class="terminal-row">> %100 Saf Donanım Modu aktif.</div>
            <div class="terminal-row">> Derin OSINT ve Turnike ses sürücüleri hazır.</div>
        </div>
    </div>

    <div class="os-menu">
        <button class="menu-btn active" onclick="changeModule('nfc-mod')">NFC READER</button>
        <button class="menu-btn" onclick="changeModule('usb-mod')">BAD USB</button>
        <button class="menu-btn" onclick="changeModule('net-mod')">PING TOOL</button>
        <button class="menu-btn" onclick="changeModule('meta-mod')">METADATA</button>
    </div>

    <div id="nfc-mod" class="module-panel active">
        <h4>💳 HARDWARE NFC SCANNER</h4>
        <button class="ctrl-btn" onclick="runNFCSys('SCAN')">KARTI OKUMAYA BAŞLA</button>
    </div>

    <div id="usb-mod" class="module-panel">
        <h4>⌨️ BAD USB SCRIPT GENERATOR</h4>
        <label>Saldırı Senaryosu Seçin:</label>
        <select id="usb-payload">
            <option value="WIFI">Kayıtlı Wi-Fi Şifrelerini Göster</option>
            <option value="LOCK">Hedef Bilgisayarı Kilitle</option>
            <option value="FAKE">Sahte Windows Güncelleme Ekranı Aç</option>
        </select>
        <button class="ctrl-btn" onclick="runBedUSBSys()">PAYLOAD ÜRET VE KOPYALA</button>
    </div>

    <div id="net-mod" class="module-panel">
        <h4>🌐 NETWORK ICMP PING</h4>
        <label>Hedef Cihazın IP Adresi:</label>
        <input type="text" id="target-ip" value="192.168.1.1">
        <button class="ctrl-btn" onclick="runNetworkSys('PING')">CANLI PİNG GÖNDER</button>
    </div>

    <div id="meta-mod" class="module-panel">
        <h4>📁 OSINT IMAGE DECODER</h4>
        <label style="text-align: center;">Fotoğraf Seçmek İçin Kareye Dokunun:</label>
        
        <input type="file" id="meta-file" accept="image/*" style="display: none;" onchange="handleFileSelect(this)">
        
        <div class="image-drop-zone" onclick="document.getElementById('meta-file').click()">
            <span id="upload-text">➕<br><br>GALERİDEN SEÇ</span>
            <img id="preview-img" alt="Önizleme">
        </div>

        <button class="ctrl-btn" onclick="runMetadataSys()">METADATAYI DERİN TARAMA YAP</button>
    </div>
</div>

<script src="badusb_payloads.js"></script>
<script src="nfc_core.js"></script>
<script src="network_scanner.js"></script>
<script src="metadata_analyzer.js"></script>

<script>
    // Gelişmiş Ses Sentezleyici (Sıfır Dosya - %100 Gerçek Frekans Üretimi)
    function playFlipperSound(type) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            if (type === 'click') {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(850, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.02); 
            } 
            else if (type === 'success') {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(1300, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.08);
            } 
            // Turnike Geçiş Başarılı Onay Sesi (Mekanik Çift Tonlu "Trink" Etkisi)
            else if (type === 'trink') {
                const now = audioCtx.currentTime;
                
                // 1. Ton (Yüksek ve net frekans başlangıcı)
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(1800, now);
                gain1.gain.setValueAtTime(0.06, now);
                gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                osc1.start(now);
                osc1.stop(now + 0.15);

                // 2. Ton (Hemen milisaniye sonra vuran armoni)
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(2200, now + 0.04);
                gain2.gain.setValueAtTime(0.05, now + 0.04);
                gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                osc2.start(now + 0.04);
                osc2.stop(now + 0.2);
            }
        } catch (e) {
            console.log("Ses motoru donanım engeline takıldı.");
        }
    }

    // Galeri Seçim Yönetimi (Kare içine resmi basar)
    function handleFileSelect(input) {
        const file = input.files[0];
        if (file) {
            playFlipperSound('success');
            const reader = new FileReader();
            reader.onload = function(e) {
                const imgElement = document.getElementById('preview-img');
                const textElement = document.getElementById('upload-text');
                
                imgElement.src = e.target.result;
                imgElement.style.display = 'block'; // Resmi göster
                textElement.style.display = 'none'; // Yazıyı gizle
                
                printLog(`Görsel belleğe yüklendi: ${file.name}`);
            };
            reader.readAsDataURL(file);
        }
    }

    function changeModule(modId) {
        playFlipperSound('click');
        document.querySelectorAll('.module-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(modId).classList.add('active');
        event.currentTarget.classList.add('active');
        
        printLog(`Modül aktif: ${modId.replace('-mod', '').toUpperCase()}`);
    }

    function printLog(text, isError = false) {
        let container = document.getElementById('displayLogs');
        let row = document.createElement('div');
        row.className = 'terminal-row';
        if(isError) row.style.color = '#ff3333';
        row.innerText = `> ${text}`;
        container.appendChild(row);
        
        let screen = document.getElementById('flipperScreen');
        screen.scrollTop = screen.scrollHeight;
    }

    // NFC Tetikleyici
    function runNFCSys(mode) {
        playFlipperSound('click');
        if(typeof startNFCScan === "function") {
            startNFCScan(printLog);
        }
    }

    // Bad USB Tetikleyici
    function runBedUSBSys() {
        playFlipperSound('click');
        let type = document.getElementById('usb-payload').value;
        if(typeof generateBadUsb === "function") {
            generateBadUsb(type);
            playFlipperSound('success');
            printLog(`DuckyScript üretildi ve panoya alındı.`);
        }
    }

    // Ping Tetikleyici
    function runNetworkSys(mode) {
        playFlipperSound('click');
        let target = document.getElementById('target-ip').value;
        if(typeof executePing === "function") {
            executePing(target, printLog);
        }
    }

    // Metadata Derin Analiz Tetikleyicisi
    function runMetadataSys() {
        playFlipperSound('click');
        const fileInput = document.getElementById('meta-file');
        const file = fileInput.files[0];
        if(typeof analyzeImageMetadata === "function") {
            analyzeImageMetadata(file, printLog);
            playFlipperSound('success');
        } else {
            printLog("Metadata motor dosyası eksik!", true);
        }
    }
</script>

</body>
</html>
