<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB-FLIPPER v1.0</title>
    <style>
        body {
            background-color: #121212;
            color: #ff8c00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .flipper-device {
            border: 4px solid #ff8c00;
            padding: 25px;
            background-color: #000;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 25px rgba(255, 140, 0, 0.4);
            width: 350px;
        }
        .screen {
            border: 2px solid #ff8c00;
            padding: 15px;
            margin-bottom: 20px;
            background-color: #1c1c1c;
            height: 120px;
            overflow-y: auto;
            text-align: left;
            font-size: 13px;
        }
        .screen h3 { margin: 0 0 10px 0; text-align: center; border-bottom: 1px dashed #ff8c00; pb: 5px; }
        .terminal-log { color: #00ff00; margin: 3px 0; }
        
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; text-align: left;}
        select {
            width: 100%;
            padding: 10px;
            background: #222;
            color: #ff8c00;
            border: 2px solid #ff8c00;
            font-family: monospace;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            background-color: #ff8c00;
            color: black;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            font-family: monospace;
            transition: 0.2s;
        }
        button:hover { background-color: #ffaa33; }
        button:active { background-color: #cc7000; }
        .btn-danger { background-color: #ff3333; color: white; }
        .btn-danger:hover { background-color: #ff6666; }
    </style>
</head>
<body>

<div class="flipper-device">
    <div class="screen" id="screen">
        <h3>🐬 FLIPPER WEB UI v1.0</h3>
        <div id="logs"><div class="terminal-log">> Sistem başlatıldı...</div><div class="terminal-log">> Modüller: OK</div></div>
    </div>

    <label for="tv-brand">📡 CİHAZ MARKASI SEÇ:</label>
    <select id="tv-brand" onchange="playBeep(400, 0.05)">
        <option value="Samsung">Samsung TV</option>
        <option value="LG">LG Smart TV</option>
        <option value="Sony">Sony TV</option>
        <option value="Vestel">Vestel / Beko</option>
        <option value="Genel">Genel (Tüm Markalar - Klon)</option>
    </select>

    <div class="btn-grid">
        <button class="btn-danger" onclick="executeAction('TV_POWER', 'Kızılötesi Güç Sinyali fırlatıldı!')">GÜÇ (IR)</button>
        <button onclick="executeAction('MUTE', 'Ses Kapatma sinyali gönderildi.')">SES KES</button>
        <button onclick="executeAction('NET_SCAN', 'Ağ taraması başlatılıyor...')">AĞ TARAMA</button>
        <button onclick="executeAction('BAD_USB', 'BadUSB betiği üretildi!')">BAD USB</button>
    </div>
</div>

<script>
// Flipper'ın meşhur 8-bit bip sesini tarayıcıda üreten fonksiyon
function playBeep(frequency = 600, duration = 0.1) {
    try {
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let oscillator = audioCtx.createOscillator();
        let gainNode = audioCtx.createGain();

        oscillator.type = 'square'; // Retro ses için square dalga
        oscillator.frequency.value = frequency;
        
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); // Ses seviyesi
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + duration);
    } catch(e) {
        console.log("Ses çalınamadı (Kullanıcı etkileşimi gerekiyor)");
    }
}

function addLog(text, isError = false) {
    let logsDiv = document.getElementById('logs');
    let newLog = document.createElement('div');
    newLog.className = 'terminal-log';
    if(isError) newLog.style.color = '#ff3333';
    newLog.innerText = `> ${text}`;
    logsDiv.appendChild(newLog);
    
    // Ekranı otomatik aşağı kaydır
    let screen = document.getElementById('screen');
    screen.scrollTop = screen.scrollHeight;
}

function executeAction(actionType, message) {
    let brand = document.getElementById('tv-brand').value;
    
    // Çift bip sesi (İşlem başladı)
    playBeep(800, 0.08);
    setTimeout(() => playBeep(1000, 0.05), 100);

    addLog(`${brand} için ${actionType}...`);
    
    setTimeout(() => {
        addLog(message);
        
        if(actionType === 'NET_SCAN') {
            addLog("IP bulundu: 192.168.1.42 (Akıllı TV?)");
        }
        if(actionType === 'BAD_USB') {
            addLog("DuckyScript kopyalandı! (Simüle)");
        }
    }, 800);
}
</script>

</body>
</html>
