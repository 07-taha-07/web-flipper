<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLIPPER WEB TOOLKIT</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: #ff8c00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            user-select: none;
        }
        .flipper-device {
            border: 4px solid #ff8c00;
            background-color: #000;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 0 35px rgba(255, 140, 0, 0.4);
        }
        .flipper-screen {
            border: 2px solid #ff8c00;
            background-color: #161616;
            border-radius: 10px;
            padding: 15px;
            height: 180px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-size: 13px;
            box-shadow: inset 0 0 10px rgba(255, 140, 0, 0.2);
        }
        .screen-title {
            text-align: center;
            font-weight: bold;
            border-bottom: 2px dashed #ff8c00;
            padding-bottom: 5px;
            margin-bottom: 10px;
            color: #ff9d22;
        }
        .terminal-row {
            color: #00ff44;
            margin: 3px 0;
            line-height: 1.4;
        }

        /* İŞLETİM SİSTEMİ SEKMELERİ */
        .os-menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 20px;
        }
        .menu-btn {
            background-color: #1a1a1a;
            color: #ff8c00;
            border: 1px solid #ff8c00;
            padding: 10px 4px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            border-radius: 4px;
        }
        .menu-btn.active {
            background-color: #ff8c00;
            color: #000;
            box-shadow: 0 0 10px rgba(255, 140, 0, 0.5);
        }

        .module-panel {
            display: none;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 10px;
            background-color: #050505;
        }
        .module-panel.active { display: block; }
        
        h4 { margin: 0 0 12px 0; text-align: center; font-size: 14px; color: #ffaa00; text-transform: uppercase; }
        label { display: block; margin: 10px 0 5px 0; font-size: 12px; font-weight: bold; }
        
        select, input {
            width: 100%;
            padding: 10px;
            background: #111;
            color: #ff8c00;
            border: 1px solid #ff8c00;
            font-family: monospace;
            box-sizing: border-box;
            margin-bottom: 12px;
            border-radius: 4px;
        }

        button.ctrl-btn {
            width: 100%;
            background-color: #ff8c00;
            color: #000;
            border: none;
            padding: 14px;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            border-radius: 6px;
            font-size: 12px;
            text-transform: uppercase;
        }
        button.ctrl-btn:active { background-color: #cc7000; }
    </style>
</head>
<body>

<div class="flipper-device">
    <div class="flipper-screen" id="flipperScreen">
        <div class="screen-title">🐬 FLIPPER HARDWARE INTERFACE</div>
        <div id="displayLogs">
            <div class="terminal-row">> Sistem hazır. Simülasyon modları kaldırıldı.</div>
            <div class="terminal-row">> Donanım API bağlantıları aktif.</div>
        </div>
    </div>

    <div class="os-menu">
        <button class="menu-btn active" onclick="changeModule('nfc-mod')">NFC READER</button>
        <button class="menu-btn" onclick="changeModule('usb-mod')">BAD USB</button>
        <button class="menu-btn" onclick="changeModule('net-mod')">PING TOOL</button>
    </div>

    <div id="nfc-mod" class="module-panel active">
        <h4>💳 HARDWARE NFC SCANNER</h4>
        <p style="font-size: 11px; color: #888; margin-top: 0;">Yalnızca NFC destekli Android cihazlarda ve HTTPS bağlantılarında fiziksel kartları okur.</p>
        <button class="ctrl-btn" onclick="runNFCSys('SCAN')">KARTI OKUMAYA BAŞLA</button>
    </div>

    <div id="usb-mod" class="module-panel">
        <h4>⌨️ BAD USB SCRIPT INJECTOR</h4>
        <label>Saldırı Senaryosu Seçin:</label>
        <select id="usb-payload">
            <option value="WIFI">Kayıtlı Wi-Fi Şifrelerini Göster</option>
            <option value="LOCK">Hedef Bilgisayarı Kilitle</option>
            <option value="FAKE">Sahte Windows Güncelleme Ekranı Aç</option>
        </select>
        <button class="ctrl-btn" onclick="runBedUSBSys()">PAYLOAD ÜRET VE KOPYALA</button>
    </div>

    <div id="net-mod" class="module-panel">
        <h4>🌐 NETWORK ICMP/HTTP PING</h4>
        <label>Hedef Cihazın IP Adresi:</label>
        <input type="text" id="target-ip" value="192.168.1.1">
        <button class="ctrl-btn" onclick="runNetworkSys('PING')">CANLI PİNG GÖNDER</button>
    </div>
</div>

<script src="badusb_payloads.js"></script>
<script src="nfc_core.js"></script>
<script src="network_scanner.js"></script>

<script>
    function changeModule(modId) {
        document.querySelectorAll('.module-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(modId).classList.add('active');
        event.currentTarget.classList.add('active');
        
        printLog(`Modül aktif: ${modId.replace('-mod', '').toUpperCase()}`);
    }

    function printLog(text, isError = false) {
        let container = document.getElementById('displayLogs');
        let row = document.createElement('div');
        row.className = 'terminal-row';
        if(isError) row.style.color = '#ff3333';
        row.innerText = `> ${text}`;
        container.appendChild(row);
        
        let screen = document.getElementById('flipperScreen');
        screen.scrollTop = screen.scrollHeight;
    }

    // Gerçek NFC Tetikleyicisi
    function runNFCSys(mode) {
        if(typeof startNFCScan === "function") {
            startNFCScan(printLog);
        } else {
            printLog("NFC sürücü dosyası bulunamadı!", true);
        }
    }

    // Gerçek Bad USB Kopyalayıcısı
    function runBedUSBSys() {
        let type = document.getElementById('usb-payload').value;
        if(typeof generateBadUsb === "function") {
            let scriptData = generateBadUsb(type);
            printLog(`DuckyScript başarıyla üretildi ve panoya alındı.`);
        } else {
            printLog("Bad USB sürücü dosyası bulunamadı!", true);
        }
    }

    // Gerçek Canlı Ping Tetikleyicisi
    function runNetworkSys(mode) {
        let target = document.getElementById('target-ip').value;
        if(typeof executePing === "function") {
            executePing(target, printLog);
        } else {
            printLog("Ağ analiz sürücü dosyası bulunamadı!", true);
        }
    }
</script>

</body>
</html>
