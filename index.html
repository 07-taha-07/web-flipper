<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLIPPER REAL TOOLKIT</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: #ff8c00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            user-select: none;
            position: relative;
        }
        
        /* Sağ Üst Köşeye Sabitlenen Global Sıfırla Butonu */
        #global-reset-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            background-color: #ff3333;
            color: white;
            border: 2px solid #990000;
            padding: 10px 18px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            border-radius: 4px;
            z-index: 9999;
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.4);
            transition: all 0.2s ease;
        }
        #global-reset-btn:hover {
            background-color: #cc0000;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.8);
            transform: scale(1.05);
        }

        .flipper-device {
            border: 4px solid #ff8c00;
            background-color: #000;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 0 35px rgba(255, 140, 0, 0.4);
        }
        .flipper-screen {
            border: 2px solid #ff8c00;
            background-color: #161616;
            border-radius: 10px;
            padding: 15px;
            height: 180px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-size: 13px;
            box-shadow: inset 0 0 10px rgba(255, 140, 0, 0.2);
        }
        .screen-title {
            text-align: center;
            font-weight: bold;
            border-bottom: 2px dashed #ff8c00;
            padding-bottom: 5px;
            margin-bottom: 10px;
            color: #ff9d22;
        }
        .terminal-row {
            color: #00ff44;
            margin: 3px 0;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        /* İŞLETİM SİSTEMİ SEKMELERİ */
        .os-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            margin-bottom: 20px;
        }
        .menu-btn {
            background-color: #1a1a1a;
            color: #ff8c00;
            border: 1px solid #ff8c00;
            padding: 12px 2px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            border-radius: 4px;
            text-align: center;
        }
        .menu-btn.active {
            background-color: #ff8c00;
            color: #000;
            box-shadow: 0 0 10px rgba(255, 140, 0, 0.5);
        }

        .module-panel {
            display: none;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 10px;
            background-color: #050505;
        }
        .module-panel.active { display: block; }
        
        h4 { margin: 0 0 12px 0; text-align: center; font-size: 14px; color: #ffaa00; text-transform: uppercase; }
        label { display: block; margin: 10px 0 5px 0; font-size: 12px; font-weight: bold; }
        
        select, input {
            width: 100%;
            padding: 10px;
            background: #111;
            color: #ff8c00;
            border: 1px solid #ff8c00;
            font-family: monospace;
            box-sizing: border-box;
            margin-bottom: 12px;
            border-radius: 4px;
        }

        button.ctrl-btn {
            width: 100%;
            background-color: #ff8c00;
            color: #000;
            border: none;
            padding: 14px;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            border-radius: 6px;
            font-size: 11px;
            text-transform: uppercase;
            margin-top: 5px;
        }
        button.ctrl-btn:active { background-color: #cc7000; }
        
        /* SMS Modülü Ekstra Buton Tasarımları */
        .sms-btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .sms-sub-btn {
            padding: 10px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            font-size: 11px;
            border: 1px solid #ff8c00;
        }
        #sms-restart-btn { background-color: #111; color: #ffaa00; }
        #sms-stop-btn { background-color: #220000; color: #ff3333; border-color: #ff3333; }
    </style>
</head>
<body>

<!-- GLOBAL RESET BUTTON -->
<button id="global-reset-btn" onclick="globalSystemReset()">⚠️ SIFIRLA</button>

<div class="flipper-device">
    <!-- MAIN FLIPPER TERMINAL SCREEN -->
    <div class="flipper-screen" id="flipperScreen">
        <div class="screen-title">🐬 FLIPPER REAL-OS v7.0</div>
        <div id="displayLogs">
            <div class="terminal-row">> %100 Saf Donanım Modu aktif.</div>
            <div class="terminal-row">> Tüm modül sistemleri hazır hale getirildi.</div>
        </div>
    </div>

    <!-- MODÜL SEÇİM MENÜSÜ -->
    <div class="os-menu">
        <button class="menu-btn active" onclick="changeModule('nfc-mod')">💳 NFC SCAN</button>
        <button class="menu-btn" onclick="changeModule('usb-mod')">⌨️ BAD USB</button>
        <button class="menu-btn" onclick="changeModule('net-mod')">🌐 ICMP PING</button>
        <button class="menu-btn" onclick="changeModule('sms-mod')">⚡ SMS BOMBER</button>
    </div>

    <!-- 1. REAL NFC -->
    <div id="nfc-mod" class="module-panel active">
        <h4>💳 HARDWARE NFC SCANNER</h4>
        <button class="ctrl-btn" onclick="runNFCSys()">KARTI OKUMAYA BAŞLA</button>
    </div>

    <!-- 2. REAL BAD USB -->
    <div id="usb-mod" class="module-panel">
        <h4>⌨️ BAD USB GENERATOR</h4>
        <select id="usb-payload">
            <option value="WIFI">Kayıtlı Wi-Fi Şifrelerini Göster</option>
            <option value="LOCK">Hedef Bilgisayarı Kilitle</option>
            <option value="FAKE">Sahte Windows Güncelleme Ekranı Aç</option>
        </select>
        <button class="ctrl-btn" onclick="runBedUSBSys()">PAYLOAD ÜRET VE KOPYALA</button>
    </div>

    <!-- 3. REAL PING -->
    <div id="net-mod" class="module-panel">
        <h4>🌐 NETWORK ICMP PING</h4>
        <input type="text" id="target-ip" value="192.168.1.1">
        <button class="ctrl-btn" onclick="runNetworkSys()">CANLI PİNG GÖNDER</button>
    </div>

    <!-- 4. REAL SMS BOMBER (SİMÜLASYON SCRIPT MOTORU) -->
    <div id="sms-mod" class="module-panel">
        <h4>⚡ SMS_BOMBER.PY TERMINAL</h4>
        <label id="sms-prompt-lbl">Telefon Numarası Girin:</label>
        <input type="text" id="sms-input" placeholder="Örn: 5403302010" oninput="validateNumberOnly(this)">
        
        <button class="ctrl-btn" id="sms-send-btn" onclick="submitSmsInput()">VERİYİ GÖNDER</button>
        
        <div class="sms-btn-grid">
            <button class="sms-sub-btn" id="sms-restart-btn" onclick="restartSmsScript()">🔄 YENİDEN BAŞLAT</button>
            <button class="sms-sub-btn" id="sms-stop-btn" onclick="stopSmsScript()">🛑 SONLANDIR</button>
        </div>
    </div>
</div>

<!-- SÜRÜCÜ BAĞLANTILARI -->
<script src="badusb_payloads.js"></script>
<script src="nfc_core.js"></script>
<script src="network_scanner.js"></script>

<script>
    // ==========================================
    // SMS_BOMBER.PY CORE MANTIKSAL DÖNGÜSÜ (JS)
    // ==========================================
    let smsState = "NUMBER"; // NUMBER, AMOUNT, SPEED, RUNNING, STOPPED
    let targetNum = "";
    let smsAmount = 0;
    let smsSpeed = 10;
    let smsInterval = null;
    let sentCount = 0;

    // Sadece sayı girilmesini sağlayan filtre
    function validateNumberOnly(input) {
        input.value = input.value.replace(/[^0-9]/g, '');
    }

    function initSmsInterface() {
        smsState = "NUMBER";
        document.getElementById("sms-prompt-lbl").innerText = 'Telefon Numarası Yazın (Örn: 5403302010):';
        document.getElementById("sms-input").placeholder = "54xxxxxxxx";
        document.getElementById("sms-input").value = "";
        document.getElementById("sms-input").disabled = false;
        document.getElementById("sms-send-btn").disabled = false;
    }

    function submitSmsInput() {
        playFlipperSound('click');
        const inputVal = document.getElementById("sms-input").value.trim();
        if(!inputVal) return;

        document.getElementById("sms-input").value = "";

        if (smsState === "NUMBER") {
            if(inputVal.length >= 10) {
                targetNum = inputVal;
                printLog(`[?] Telefon Numarası: ${targetNum}`);
                smsState = "AMOUNT";
                document.getElementById("sms-prompt-lbl").innerText = 'Kaç SMS Gönderilsin? (Sonsuz için 0):';
                document.getElementById("sms-input").placeholder = "Adet girin veya 0 yazın";
            } else {
                printLog("HATA: Eksik veya hatalı numara girdiniz!", true);
            }
        } 
        else if (smsState === "AMOUNT") {
            smsAmount = parseInt(inputVal, 10);
            printLog(`[?] Gönderim Adedi: ${smsAmount === 0 ? "Sonsuz (0)" : smsAmount}`);
            smsState = "SPEED";
            document.getElementById("sms-prompt-lbl").innerText = 'Gönderim Hızını Girin (Tavsiye: 5-100):';
            document.getElementById("sms-input").placeholder = "Hız katsayısı girin";
        } 
        else if (smsState === "SPEED") {
            smsSpeed = parseInt(inputVal, 10);
            if(smsSpeed < 1) smsSpeed = 5;
            printLog(`[?] Gönderim Hızı: ${smsSpeed}`);
            
            // Simülasyonu ateşle
            startSmsLoop();
        }
    }

    function startSmsLoop() {
        smsState = "RUNNING";
        document.getElementById("sms-prompt-lbl").innerText = 'SCRIPT ÇALIŞIYOR (sms_bomber.py)...';
        document.getElementById("sms-input").disabled = true;
        document.getElementById("sms-send-btn").disabled = true;

        printLog(`\n--- [sms_bomber.py BAŞLATILDI] ---`);
        printLog(`[SYSTEM] Bağımlı PIP paketleri indiriliyor: requests, urllib3... Tamamlandı.`);
        printLog(`[+] ${targetNum} numarasına istek kanalları açılıyor...\n`);

        const listBrand = ["A101", "BIM", "Defacto", "Migros", "CepteSok", "BiSU", "TıklaGelsin", "SakaSu", "Marti", "Hop"];
        sentCount = 0;
        
        // Hıza göre döngü süresi hesabı (milisaniye)
        const msInterval = Math.max(150, 3000 / smsSpeed);

        smsInterval = setInterval(() => {
            sentCount++;
            const randomBrand = listBrand[Math.floor(Math.random() * listBrand.length)];
            
            printLog(`[+] [İstek #${sentCount}] -> ${randomBrand} API üzerinden döküm iletildi.`);

            if(smsAmount !== 0 && sentCount >= smsAmount) {
                stopSmsScript();
                printLog(`\n[!] GÖNDERİM TAMAMLANDI! Toplam ${sentCount} paket işlendi.`, false);
            }
        }, msInterval);
    }

    function stopSmsScript() {
        playFlipperSound('click');
        if(smsInterval) clearInterval(smsInterval);
        smsState = "STOPPED";
        document.getElementById("sms-prompt-lbl").innerText = 'Script durduruldu.';
        document.getElementById("sms-input").disabled = true;
        document.getElementById("sms-send-btn").disabled = true;
        printLog(`\n[-] [KULLANICI DURDURDU] Script çıkış kodu ile sonlandırıldı.`, true);
    }

    function restartSmsScript() {
        playFlipperSound('click');
        if(smsInterval) clearInterval(smsInterval);
        printLog(`\n[RESTART] Geçici önbellek temizlendi, script yeniden kuruluyor...`);
        initSmsInterface();
    }

    // ==========================================
    // GLOBAL RESET (SIFIRLA) FONKSİYONU
    // ==========================================
    function globalSystemReset() {
        // 1. Çalışan tüm interval/script süreçlerini durdur
        if(smsInterval) clearInterval(smsInterval);
        
        // 2. Ekranı/Terminali ilk günkü haline döndür
        document.getElementById('displayLogs').innerHTML = `
            <div class="terminal-row">> %100 Saf Donanım Modu aktif.</div>
            <div class="terminal-row">> Global sıfırlama yapıldı. Bellek uçuruldu.</div>
        `;
        
        // 3. SMS durumunu fabrika ayarlarına çek
        initSmsInterface();

        // 4. NFC ve diğer tampon bellekleri temizle (Varsa kopyalanan listeleri sıfırla)
        if(typeof savedNFCCards !== 'undefined') savedNFCCards = []; 
        
        // Küçük bir uyarı tınısı çal
        playFlipperSound('trink');
    }

    // ==========================================
    // FLIPPER SOUND ENGINE & SİSTEM KLASİKLERİ
    // ==========================================
    function playFlipperSound(type) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (type === 'click') {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'square';
                osc.frequency.setValueAtTime(850, audioCtx.currentTime); gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.02); 
            } else if (type === 'success') {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'square';
                osc.frequency.setValueAtTime(1300, audioCtx.currentTime); gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'trink') {
                const now = audioCtx.currentTime;
                const osc1 = audioCtx.createOscillator(); const gain1 = audioCtx.createGain();
                osc1.connect(gain1); gain1.connect(audioCtx.destination); osc1.type = 'sine';
                osc1.frequency.setValueAtTime(1800, now); gain1.gain.setValueAtTime(0.06, now);
                gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.15); osc1.start(now); osc1.stop(now + 0.15);
            }
        } catch (e) {}
    }

    function changeModule(modId) {
        playFlipperSound('click');
        document.querySelectorAll('.module-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(modId).classList.add('active');
        event.currentTarget.classList.add('active');
        printLog(`Modül aktif: ${modId.replace('-mod', '').toUpperCase()}`);
        
        // SMS modülüne girildiyse girdileri taze tut
        if(modId === 'sms-mod') {
            initSmsInterface();
        }
    }

    function printLog(text, isError = false) {
        let container = document.getElementById('displayLogs');
        let row = document.createElement('div');
        row.className = 'terminal-row';
        if(isError) row.style.color = '#ff3333';
        row.innerText = `> ${text}`;
        container.appendChild(row);
        let screen = document.getElementById('flipperScreen');
        screen.scrollTop = screen.scrollHeight;
    }

    function runNFCSys() { playFlipperSound('click'); if(typeof startNFCScan === "function") startNFCScan(printLog); }
    function runBedUSBSys() {
        playFlipperSound('click');
        let type = document.getElementById('usb-payload').value;
        if(typeof generateBadUsb === "function") { generateBadUsb(type); playFlipperSound('success'); }
    }
    function runNetworkSys() { playFlipperSound('click'); let target = document.getElementById('target-ip').value; if(typeof executePing === "function") executePing(target, printLog); }
</script>
</body>
</html>
