<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLIPPER ZERO SYSTEM OS</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: #ff8c00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }
        .flipper-device {
            border: 4px solid #ff8c00;
            background-color: #000;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 0 35px rgba(255, 140, 0, 0.4);
        }
        /* Dijital Ekran Modülü */
        .flipper-screen {
            border: 2px solid #ff8c00;
            background-color: #161616;
            border-radius: 10px;
            padding: 15px;
            height: 180px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-size: 13px;
            box-shadow: inset 0 0 10px rgba(255, 140, 0, 0.2);
        }
        .screen-title {
            text-align: center;
            font-weight: bold;
            border-bottom: 2px dashed #ff8c00;
            padding-bottom: 5px;
            margin-bottom: 10px;
            color: #ff9d22;
        }
        .terminal-row {
            color: #00ff44;
            margin: 3px 0;
            line-height: 1.4;
        }
        /* Dinamik Anahtar Grafiği (Videodaki Özellik) */
        .key-decoder-visual {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 50px;
            border-bottom: 2px solid #ff8c00;
            margin: 10px 0;
            padding-bottom: 5px;
        }
        .key-pin {
            width: 12px;
            background-color: #ff8c00;
            text-align: center;
            color: #000;
            font-size: 10px;
            font-weight: bold;
            transition: height 0.3s;
        }

        /* İşletim Sistemi Menüleri */
        .os-menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 20px;
        }
        .menu-btn {
            background-color: #1a1a1a;
            color: #ff8c00;
            border: 1px solid #ff8c00;
            padding: 8px 4px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            border-radius: 4px;
            transition: 0.2s;
        }
        .menu-btn.active {
            background-color: #ff8c00;
            color: #000;
            box-shadow: 0 0 10px rgba(255, 140, 0, 0.5);
        }

        /* Sekme İçerikleri */
        .module-panel {
            display: none;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 10px;
            background-color: #050505;
        }
        .module-panel.active { display: block; }
        
        h4 { margin: 0 0 12px 0; text-align: center; font-size: 15px; color: #ffaa00; text-transform: uppercase; }
        label { display: block; margin: 10px 0 5px 0; font-size: 12px; font-weight: bold; }
        
        select, input {
            width: 100%;
            padding: 10px;
            background: #111;
            color: #ff8c00;
            border: 1px solid #ff8c00;
            font-family: monospace;
            box-sizing: border-box;
            margin-bottom: 12px;
            border-radius: 4px;
        }

        /* Kontrol Butonları */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button.ctrl-btn {
            background-color: #ff8c00;
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            border-radius: 6px;
            font-size: 13px;
        }
        button.ctrl-btn:active { background-color: #cc7000; }
        button.alert { background-color: #ff2222; color: #fff; }
        button.alert:active { background-color: #aa0000; }
    </style>
</head>
<body>

<div class="flipper-device">
    <div class="flipper-screen" id="flipperScreen">
        <div class="screen-title">🐬 FLIPPER CENTRAL SYSTEM</div>
        <div id="displayLogs">
            <div class="terminal-row">> Tüm donanım modülleri hazır durumda.</div>
            <div class="terminal-row">> Tarama modunu seçin...</div>
        </div>
    </div>

    <div class="os-menu">
        <button class="menu-btn active" onclick="changeModule('ir-mod')">INFRARED</button>
        <button class="menu-btn" onclick="changeModule('sub-mod')">SUB-GHz</button>
        <button class="menu-btn" onclick="changeModule('nfc-mod')">NFC/RFID</button>
        <button class="menu-btn" onclick="changeModule('key-mod')">KEY DECODER</button>
        <button class="menu-btn" onclick="changeModule('usb-mod')">BAD USB</button>
        <button class="menu-btn" onclick="changeModule('net-mod')">NETWORK</button>
    </div>

    <div id="ir-mod" class="module-panel active">
        <h4>📡 INFRARED TRANSMITTER</h4>
        <label>Cihaz / Sinyal Veritabanı:</label>
        <select id="ir-database">
            <option value="Samsung">Samsung TV (Tüm Modeller)</option>
            <option value="LG">LG Smart TV (WebOS)</option>
            <option value="Sony">Sony Bravia</option>
            <option value="Vestel">Vestel / Beko / Arçelik</option>
            <option value="Klima">Universal Klima (Aç/Kapat)</option>
        </select>
        <div class="action-grid">
            <button class="ctrl-btn alert" onclick="runAction('IR_TX_POWER', 'GÜÇ kapatma kodu (HEX) kızılötesi ile fırlatıldı!')">GÜÇ (IR)</button>
            <button class="ctrl-btn" onclick="runAction('IR_TX_MUTE', 'SES KESME sinyali gönderildi.')">SES KES</button>
            <button class="ctrl-btn" onclick="runAction('IR_TX_SRC', 'KAYNAK (Source/HDMI) sinyali fırlatıldı.')">KAYNAK</button>
            <button class="ctrl-btn" onclick="runAction('IR_RX', 'Kızılötesi alıcı aktif. Kumandayı telefona doğrultup basın...')">KODU KOPYALA</button>
        </div>
    </div>

    <div id="sub-mod" class="module-panel">
        <h4>📻 SUB-GHz RADIO</h4>
        <label>Frekans Modülasyonu:</label>
        <select id="sub-frequency">
            <option value="433.92">433.92 MHz (Araba / Garaj Kumandaları)</option>
            <option value="315.00">315.00 MHz (Bariyer Kumandaları)</option>
            <option value="868.35">868.35 MHz (Güvenlikli Geçişler)</option>
        </select>
        <div class="action-grid">
            <button class="ctrl-btn" onclick="runAction('SUB_RX', 'Sinyal dinleniyor... Kumandaya basın.')">SİNYAL YAKALA</button>
            <button class="ctrl-btn alert" onclick="runAction('SUB_TX', 'Kopyalanan frekans kodu havaya yayılıyor (Emülasyon)!')">SİNYAL YAY (TX)</button>
        </div>
    </div>

    <div id="nfc-mod" class="module-panel">
        <h4>💳 NFC & RFID EMULATOR</h4>
        <label>Kart Protokolü:</label>
        <select id="nfc-protocol">
            <option value="Mifare">Mifare Classic 1K (Ulaşım / Otel Kartları)</option>
            <option value="RFID 125">RFID 125 kHz (Bina Giriş Anahtarlığı)</option>
            <option value="NTAG">NTAG21X (RFID Etiketler)</option>
        </select>
        <div class="action-grid">
            <button class="ctrl-btn" onclick="runAction('NFC_SCAN', 'NFC alanı aktif. Kartı telefonun arkasına dokundurun...')">KART OKU / KOPYALA</button>
            <button class="ctrl-btn alert" onclick="runAction('NFC_EMU', 'Kart UID kodu kopyalandı! Kart simüle ediliyor...')">KARTI YAYINLA</button>
        </div>
    </div>

    <div id="key-mod" class="module-panel">
        <h4>🔑 MECHANICAL KEY DECODER</h4>
        <p style="font-size: 11px; margin: 0 0 10px 0; text-align: center;">Kamerayı anahtara doğrultun veya değerleri analiz edin.</p>
        <div class="key-decoder-visual">
            <div class="key-pin" id="pin1" style="height: 10px;">0</div>
            <div class="key-pin" id="pin2" style="height: 10px;">0</div>
            <div class="key-pin" id="pin3" style="height: 10px;">0</div>
            <div class="key-pin" id="pin4" style="height: 10px;">0</div>
            <div class="key-pin" id="pin5" style="height: 10px;">0</div>
            <div class="key-pin" id="pin6" style="height: 10px;">0</div>
        </div>
        <div class="action-grid">
            <button class="ctrl-btn" style="grid-column: span 2;" onclick="decodeKey()">ANAHTARI ANALİZ ET / KODU AL</button>
        </div>
    </div>

    <div id="usb-mod" class="module-panel">
        <h4>⌨️ BAD USB SCRIPT GENERATOR</h4>
        <label>Saldırı Senaryosu:</label>
        <select id="usb-payload">
            <option value="WIFI">Sistemdeki Tüm Kayıtlı Wi-Fi Şifrelerini Göster</option>
            <option value="LOCK">Hedef Bilgisayarı Saniyeler İçinde Kilitle</option>
            <option value="FAKE">Sahte Windows Çökme Ekranı Tetikle</option>
        </select>
        <button class="ctrl-btn" style="width: 100%;" onclick="runAction('BAD_USB', 'DuckyScript derlendi! Kod panoya kopyalandı.')">PAYLOAD ÜRET</button>
    </div>

    <div id="net-mod" class="module-panel">
        <h4>🌐 NETWORK ANALYZER</h4>
        <label>Yerel Ağ Hedefi:</label>
        <input type="text" id="target-ip" value="192.168.1.1">
        <div class="action-grid">
            <button class="ctrl-btn" onclick="runAction('NET_PING', 'Paketler gönderiliyor...')">PING TEST</button>
            <button class="ctrl-btn" onclick="runAction('NET_SCAN', 'Wi-Fi ağındaki IP adresleri listeleniyor...')">AĞI TARA</button>
        </div>
    </div>
</div>

<script>
    // Modüller arası geçiş sistemi
    function changeModule(modId) {
        document.querySelectorAll('.module-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(modId).classList.add('active');
        event.currentTarget.classList.add('active');
        
        printLog(`Modül aktif edildi: ${modId.replace('-mod', '').toUpperCase()}`);
    }

    // Ekranda log gösterme fonksiyonu
    function printLog(text) {
        let container = document.getElementById('displayLogs');
        let row = document.createElement('div');
        row.className = 'terminal-row';
        row.innerText = `> ${text}`;
        container.appendChild(row);
        
        let screen = document.getElementById('flipperScreen');
        screen.scrollTop = screen.scrollHeight;
    }

    // Aksiyon tetikleyici ara yüz fonksiyonu
    function runAction(type, msg) {
        printLog(msg);
        
        // Buraya ilerleyen süreçte donanımsal scriptlerimizi veya fetch komutlarımızı entegre edeceğiz
        if(type === 'NFC_SCAN') {
            setTimeout(() => printLog("Kart Algılandı! UID: 04:DE:7E:AA:B2:5C:80"), 1500);
        }
        if(type === 'SUB_RX') {
            setTimeout(() => printLog("Frekans Yakalandı: [433.92 MHz] RAW Veri Kaydedildi."), 2000);
        }
    }

    // Mekanik Anahtar Derinliği Çözücü (Videodaki Özel Sistem)
    function decodeKey() {
        printLog("Anahtar profili taranıyor...");
        
        // Rastgele gerçekçi anahtar diş kodları simüle edelim (Örn videodaki gibi)
        let codes = [
            Math.floor(Math.random() * 9),
            Math.floor(Math.random() * 9),
            Math.floor(Math.random() * 9),
            Math.floor(Math.random() * 9),
            Math.floor(Math.random() * 9),
            Math.floor(Math.random() * 9)
        ];

        setTimeout(() => {
            for(let i = 1; i <= 6; i++) {
                let pinVal = codes[i-1];
                let pinElement = document.getElementById(`pin${i}`);
                pinElement.innerText = pinVal;
                pinElement.style.height = `${(pinVal + 1) * 5}px`; // Grafiği yükseltip düşürür
            }
            printLog(`Anahtar Kodu Çözüldü: ${codes.join(' ')} (SC4)`);
        }, 1200);
    }
</script>

</body>
</html>
