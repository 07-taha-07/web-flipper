<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLIPPER REAL TOOLKIT</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: #ff8c00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            user-select: none;
            position: relative;
        }
        
        /* Sağ Üst Köşeye Sabitlenen Global Sıfırla Butonu */
        #global-reset-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            background-color: #ff3333;
            color: white;
            border: 2px solid #990000;
            padding: 10px 18px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            border-radius: 4px;
            z-index: 9999;
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.4);
            transition: all 0.2s ease;
        }
        #global-reset-btn:hover {
            background-color: #cc0000;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.8);
            transform: scale(1.05);
        }

        .flipper-device {
            border: 4px solid #ff8c00;
            background-color: #000;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 0 35px rgba(255, 140, 0, 0.4);
        }
        .flipper-screen {
            border: 2px solid #ff8c00;
            background-color: #161616;
            border-radius: 10px;
            padding: 15px;
            height: 180px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-size: 13px;
            box-shadow: inset 0 0 10px rgba(255, 140, 0, 0.2);
        }
        .screen-title {
            text-align: center;
            font-weight: bold;
            border-bottom: 2px dashed #ff8c00;
            padding-bottom: 5px;
            margin-bottom: 10px;
            color: #ff9d22;
        }
        .terminal-row {
            color: #00ff44;
            margin: 3px 0;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        /* OS MENU SEKMELERİ */
        .os-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            margin-bottom: 20px;
        }
        .menu-btn {
            background-color: #1a1a1a;
            color: #ff8c00;
            border: 1px solid #ff8c00;
            padding: 12px 2px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            border-radius: 4px;
            text-align: center;
        }
        .menu-btn.active {
            background-color: #ff8c00;
            color: #000;
            box-shadow: 0 0 10px rgba(255, 140, 0, 0.5);
        }

        .module-panel {
            display: none;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 10px;
            background-color: #050505;
        }
        .module-panel.active { display: block; }
        
        h4 { margin: 0 0 12px 0; text-align: center; font-size: 14px; color: #ffaa00; text-transform: uppercase; }
        label { display: block; margin: 10px 0 5px 0; font-size: 12px; font-weight: bold; }
        
        select, input {
            width: 100%;
            padding: 10px;
            background: #111;
            color: #ff8c00;
            border: 1px solid #ff8c00;
            font-family: monospace;
            box-sizing: border-box;
            margin-bottom: 12px;
            border-radius: 4px;
        }

        button.ctrl-btn {
            width: 100%;
            background-color: #ff8c00;
            color: #000;
            border: none;
            padding: 14px;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            border-radius: 6px;
            font-size: 11px;
            text-transform: uppercase;
            margin-top: 5px;
        }
        
        /* SMS PANEL BUTONLARI */
        .sms-btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .sms-sub-btn {
            padding: 10px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            font-size: 11px;
            border: 1px solid #ff8c00;
        }
        #sms-restart-btn { background-color: #111; color: #ffaa00; }
        #sms-stop-btn { background-color: #220000; color: #ff3333; border-color: #ff3333; }
    </style>
</head>
<body>

<button id="global-reset-btn" onclick="globalSystemReset()">⚠️ SIFIRLA</button>

<div class="flipper-device">
    <div class="flipper-screen" id="flipperScreen">
        <div class="screen-title">🐬 FLIPPER REAL-OS v7.0</div>
        <div id="displayLogs">
            <div class="terminal-row">> %100 Saf Donanım Modu aktif.</div>
            <div class="terminal-row">> Tüm modül sistemleri hazır hale getirildi.</div>
        </div>
    </div>

    <div class="os-menu">
        <button class="menu-btn active" onclick="changeModule('nfc-mod')">💳 NFC SCAN</button>
        <button class="menu-btn" onclick="changeModule('usb-mod')">⌨️ BAD USB</button>
        <button class="menu-btn" onclick="changeModule('net-mod')">🌐 ICMP PING</button>
        <button class="menu-btn" onclick="changeModule('sms-mod')">⚡ SMS BOMBER</button>
    </div>

    <div id="nfc-mod" class="module-panel active">
        <h4>💳 HARDWARE NFC SCANNER</h4>
        <button class="ctrl-btn" onclick="runNFCSys()">KARTI OKUMAYA BAŞLA</button>
    </div>

    <div id="usb-mod" class="module-panel">
        <h4>⌨️ BAD USB GENERATOR</h4>
        <select id="usb-payload">
            <option value="WIFI">Kayıtlı Wi-Fi Şifrelerini Göster</option>
            <option value="LOCK">Hedef Bilgisayarı Kilitle</option>
            <option value="FAKE">Sahte Windows Güncelleme Ekranı Aç</option>
        </select>
        <button class="ctrl-btn" onclick="runBedUSBSys()">PAYLOAD ÜRET VE KOPYALA</button>
    </div>

    <div id="net-mod" class="module-panel">
        <h4>🌐 NETWORK ICMP PING</h4>
        <input type="text" id="target-ip" value="192.168.1.1">
        <button class="ctrl-btn" onclick="runNetworkSys()">CANLI PİNG GÖNDER</button>
    </div>

    <div id="sms-mod" class="module-panel">
        <h4>⚡ sms_bomber_ob.py TERMINAL</h4>
        <label id="sms-prompt-lbl">Telefon Numarası Girin:</label>
        <input type="text" id="sms-input" placeholder="Örn: 5403302010" oninput="validateNumberOnly(this)">
        
        <button class="ctrl-btn" id="sms-send-btn" onclick="handleTerminalInput()">VERİYİ GÖNDER</button>
        
        <div class="sms-btn-grid">
            <button class="sms-sub-btn" id="sms-restart-btn" onclick="restartSmsTerminal()">🔄 YENİDEN BAŞLAT</button>
            <button class="sms-sub-btn" id="sms-stop-btn" onclick="stopSmsTerminal()">🛑 SONLANDIR</button>
        </div>
    </div>
</div>

<script src="badusb_payloads.js"></script>
<script src="nfc_core.js"></script>
<script src="network_scanner.js"></script>

<script>
    // ==========================================
    // SCRIPT AKIŞINI BİREBİR YANSITAN MOTOR (JS)
    // ==========================================
    let currentStep = "NUMBER"; // NUMBER, AMOUNT, SPEED, RUNNING, FINISHED
    let userPhone = "";
    let userAmount = 0;
    let userSpeed = 10;
    let mainLoopInterval = null;
    let loopCounter = 0;

    function validateNumberOnly(input) {
        input.value = input.value.replace(/[^0-9]/g, '');
    }

    function initSmsModule() {
        currentStep = "NUMBER";
        loopCounter = 0;
        if(mainLoopInterval) clearInterval(mainLoopInterval);
        
        document.getElementById("sms-prompt-lbl").innerText = "TELEFON NUMARASI YAZIN. Örn: '5403302010'";
        document.getElementById("sms-input").placeholder = "5xxxxxxxxx";
        document.getElementById("sms-input").value = "";
        document.getElementById("sms-input").disabled = false;
        document.getElementById("sms-send-btn").disabled = false;
        
        printLog("python sms_bomber_ob.py");
    }

    function handleTerminalInput() {
        playFlipperSound('click');
        const inputField = document.getElementById("sms-input");
        const val = inputField.value.trim();
        if(!val) return;

        printLog(`>> ${val}`); // Kullanıcının yazdığını terminal satırına yansıt
        inputField.value = "";

        if (currentStep === "NUMBER") {
            if(val.length >= 10 && val.startsWith("5")) {
                userPhone = val;
                currentStep = "AMOUNT";
                document.getElementById("sms-prompt-lbl").innerText = "KAÇ SMS GÖNDERİLSİN? SINIRSIZ İÇİN '0' YAZIN";
                document.getElementById("sms-input").placeholder = "Miktar girin...";
            } else {
                printLog("[-] Hatalı numara biçimi girildi! Tekrar deneyin.", true);
            }
        } 
        else if (currentStep === "AMOUNT") {
            userAmount = parseInt(val, 10);
            currentStep = "SPEED";
            document.getElementById("sms-prompt-lbl").innerText = "SMS GÖNDERME HIZINI GİRİN (Tavsiye edilen: 5-100)";
            document.getElementById("sms-input").placeholder = "Hız katsayısı...";
        } 
        else if (currentStep === "SPEED") {
            userSpeed = parseInt(val, 10);
            if(userSpeed < 1) userSpeed = 5;
            
            // Parametre girişleri bitti, simüle Python döngüsünü başlat
            startScriptEngine();
        }
    }

    function startScriptEngine() {
        currentStep = "RUNNING";
        document.getElementById("sms-prompt-lbl").innerText = "Script Döngüsü Çalışıyor...";
        document.getElementById("sms-input").disabled = true;
        document.getElementById("sms-send-btn").disabled = true;

        printLog(`\n[+] ${userPhone} numarası için simülasyon başlatılıyor...`);
        printLog("[SYSTEM] PIP bağımlılıkları yükleniyor (requests, urllib3)... OK.\n");

        const brands = ["A101", "BIM", "Defacto", "Migros", "CepteSok", "BiSU", "TıklaGelsin", "SakaSu", "Marti", "Hop"];
        
        // Hız katsayısına göre akış milisaniyesi hesaplama
        const delay = Math.max(150, 3000 / userSpeed);

        mainLoopInterval = setInterval(() => {
            loopCounter++;
            const randomBrand = brands[loopCounter % brands.length];
            
            // Python'ın print çıktılarını terminale basıyoruz
            printLog(`[+] [İstek #${loopCounter}] -> ${randomBrand} API simüle edildi.`);

            // Eğer limit varsa ve limite ulaşıldıysa durdur
            if(userAmount !== 0 && loopCounter >= userAmount) {
                clearInterval(mainLoopInterval);
                currentStep = "FINISHED";
                document.getElementById("sms-prompt-lbl").innerText = "Script tamamlandı.";
                printLog(`\n[!] GÖNDERİM TAMAMLANDI! ${loopCounter} sahte istek işlendi.`);
            }
        }, delay);
    }

    function stopSmsTerminal() {
        playFlipperSound('click');
        if(mainLoopInterval) clearInterval(mainLoopInterval);
        currentStep = "FINISHED";
        document.getElementById("sms-prompt-lbl").innerText = "Script sonlandırıldı.";
        document.getElementById("sms-input").disabled = true;
        document.getElementById("sms-send-btn").disabled = true;
        printLog("\n[-] [SIGINT] sms_bomber_ob.py süreci kapatıldı.", true);
    }

    function restartSmsTerminal() {
        playFlipperSound('click');
        initSmsModule();
    }

    // ==========================================
    // GLOBAL SIFIRLA (RESET) KOMUTU
    // ==========================================
    function globalSystemReset() {
        if(mainLoopInterval) clearInterval(mainLoopInterval);
        document.getElementById('displayLogs').innerHTML = `
            <div class="terminal-row">> %100 Saf Donanım Modu aktif.</div>
            <div class="terminal-row">> Global sıfırlama yapıldı. Canlı script bellekleri boşaltıldı.</div>
        `;
        initSmsModule();
        playFlipperSound('trink');
    }

    // ==========================================
    // SİBER DOSTU SES MOTORU VE SEKME YÖNETİMİ
    // ==========================================
    function playFlipperSound(type) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (type === 'click') {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'square';
                osc.frequency.setValueAtTime(850, audioCtx.currentTime); gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.02); 
            } else if (type === 'trink') {
                const now = audioCtx.currentTime;
                const osc1 = audioCtx.createOscillator(); const gain1 = audioCtx.createGain();
                osc1.connect(gain1); gain1.connect(audioCtx.destination); osc1.type = 'sine';
                osc1.frequency.setValueAtTime(1800, now); gain1.gain.setValueAtTime(0.06, now);
                gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.15); osc1.start(now); osc1.stop(now + 0.15);
            }
        } catch (e) {}
    }

    function changeModule(modId) {
        playFlipperSound('click');
        document.querySelectorAll('.module-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(modId).classList.add('active');
        event.currentTarget.classList.add('active');
        printLog(`Modül aktif: ${modId.replace('-mod', '').toUpperCase()}`);
        
        if (modId === 'sms-mod') {
            initSmsModule();
        }
    }

    function printLog(text, isError = false) {
        let container = document.getElementById('displayLogs');
        let row = document.createElement('div');
        row.className = 'terminal-row';
        if(isError) row.style.color = '#ff3333';
        row.innerText = `> ${text}`;
        container.appendChild(row);
        let screen = document.getElementById('flipperScreen');
        screen.scrollTop = screen.scrollHeight;
    }

    function runNFCSys() { playFlipperSound('click'); if(typeof startNFCScan === "function") startNFCScan(printLog); }
    function runBedUSBSys() {
        playFlipperSound('click');
        let type = document.getElementById('usb-payload').value;
        if(typeof generateBadUsb === "function") { generateBadUsb(type); }
    }
    function runNetworkSys() { playFlipperSound('click'); let target = document.getElementById('target-ip').value; if(typeof executePing === "function") executePing(target, printLog); }
</script>
</body>
</html>
