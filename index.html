<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>WEB NFC SCANNER</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; justify-content: center; padding-top: 50px; }
        .container { border: 2px solid #0f0; padding: 20px; width: 350px; border-radius: 10px; }
        #log { height: 300px; overflow-y: auto; border-top: 1px solid #333; margin-top: 10px; padding-top: 10px; font-size: 14px; }
        button { background: #0f0; color: #000; border: none; padding: 10px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h3>NFC READER CORE</h3>
    <button onclick="startNFC()">TARAMAYI BAŞLAT</button>
    <div id="log"></div>
</div>

<script src="nfc_core.js"></script>
<script>
    function logger(msg, isErr = false) {
        const div = document.getElementById('log');
        div.innerHTML += `<div style="color:${isErr ? '#f00' : '#0f0'}">${msg}</div>`;
        div.scrollTop = div.scrollHeight;
    }

    function startNFC() {
        if (typeof startNFCScan === "function") {
            startNFCScan(logger);
        }
    }
</script>
</body>
</html>
