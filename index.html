<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLIPPER ZERO SYSTEM OS</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: #ff8c00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            user-select: none;
        }
        .flipper-device {
            border: 4px solid #ff8c00;
            background-color: #000;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 0 35px rgba(255, 140, 0, 0.4);
        }
        .flipper-screen {
            border: 2px solid #ff8c00;
            background-color: #161616;
            border-radius: 10px;
            padding: 15px;
            height: 180px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-size: 13px;
            box-shadow: inset 0 0 10px rgba(255, 140, 0, 0.2);
        }
        .screen-title {
            text-align: center;
            font-weight: bold;
            border-bottom: 2px dashed #ff8c00;
            padding-bottom: 5px;
            margin-bottom: 10px;
            color: #ff9d22;
        }
        .terminal-row {
            color: #00ff44;
            margin: 3px 0;
            line-height: 1.4;
        }

        /* ANAHTAR DECODER ALANI */
        .decoder-wrapper {
            border: 1px dashed #ff8c00;
            padding: 10px;
            margin-bottom: 15px;
            background: #111;
            border-radius: 8px;
        }
        .scale-control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            background: #222;
            padding: 5px;
            border-radius: 4px;
        }
        .scale-control-panel button {
            background: #ff8c00;
            color: #000;
            border: none;
            padding: 5px 10px;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
        }
        .key-decoder-visual {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 60px;
            border-bottom: 2px solid #ff8c00;
            margin: 15px auto;
            padding-bottom: 5px;
            width: 100%;
            transition: transform 0.2s;
            transform-origin: bottom center;
        }
        .key-pin-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 14%;
        }
        .pin-adj-btn {
            background: #222;
            color: #ff8c00;
            border: 1px solid #ff8c00;
            font-size: 10px;
            cursor: pointer;
            width: 20px;
            height: 20px;
            padding: 0;
            font-weight: bold;
        }
        .key-pin {
            width: 14px;
            background-color: #ff8c00;
            text-align: center;
            color: #000;
            font-size: 11px;
            font-weight: bold;
            margin: 4px 0;
            height: 15px;
        }

        /* İŞLETİM SİSTEMİ SEKMELERİ */
        .os-menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 20px;
        }
        .menu-btn {
            background-color: #1a1a1a;
            color: #ff8c00;
            border: 1px solid #ff8c00;
            padding: 8px 4px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            border-radius: 4px;
        }
        .menu-btn.active {
            background-color: #ff8c00;
            color: #000;
            box-shadow: 0 0 10px rgba(255, 140, 0, 0.5);
        }

        .module-panel {
            display: none;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 10px;
            background-color: #050505;
        }
        .module-panel.active { display: block; }
        
        h4 { margin: 0 0 12px 0; text-align: center; font-size: 15px; color: #ffaa00; text-transform: uppercase; }
        label { display: block; margin: 10px 0 5px 0; font-size: 12px; font-weight: bold; }
        
        select, input {
            width: 100%;
            padding: 10px;
            background: #111;
            color: #ff8c00;
            border: 1px solid #ff8c00;
            font-family: monospace;
            box-sizing: border-box;
            margin-bottom: 12px;
            border-radius: 4px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button.ctrl-btn {
            background-color: #ff8c00;
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            border-radius: 6px;
            font-size: 13px;
        }
        button.ctrl-btn:active { background-color: #cc7000; }
        button.alert { background-color: #ff2222; color: #fff; }
        button.alert:active { background-color: #aa0000; }
    </style>
</head>
<body>

<div class="flipper-device">
    <div class="flipper-screen" id="flipperScreen">
        <div class="screen-title">🐬 FLIPPER CENTRAL SYSTEM</div>
        <div id="displayLogs">
            <div class="terminal-row">> Çekirdek yazılım ve harici scriptler bağlandı.</div>
            <div class="terminal-row">> Sistem aktif. Bir modül seçin...</div>
        </div>
    </div>

    <div class="os-menu">
        <button class="menu-btn active" onclick="changeModule('ir-mod')">INFRARED</button>
        <button class="menu-btn" onclick="changeModule('sub-mod')">SUB-GHz</button>
        <button class="menu-btn" onclick="changeModule('nfc-mod')">NFC/RFID</button>
        <button class="menu-btn" onclick="changeModule('key-mod')">KEY DECODER</button>
        <button class="menu-btn" onclick="changeModule('usb-mod')">BAD USB</button>
        <button class="menu-btn" onclick="changeModule('net-mod')">NETWORK</button>
    </div>

    <div id="ir-mod" class="module-panel active">
        <h4>📡 INFRARED TRANSMITTER</h4>
        <label>Cihaz / Sinyal Veritabanı:</label>
        <select id="ir-database">
            <option value="Samsung">Samsung TV</option>
            <option value="LG">LG Smart TV</option>
            <option value="Sony">Sony Bravia</option>
            <option value="Vestel">Vestel / Beko</option>
            <option value="Klima">Universal Klima</option>
        </select>
        <div class="action-grid">
            <button class="ctrl-btn alert" onclick="runIRSystem('POWER')">GÜÇ (IR)</button>
            <button class="ctrl-btn" onclick="runIRSystem('MUTE')">SES KES</button>
            <button class="ctrl-btn" onclick="runIRSystem('SRC')">KAYNAK</button>
            <button class="ctrl-btn" onclick="runIRSystem('RX')">KODU KOPYALA</button>
        </div>
    </div>

    <div id="sub-mod" class="module-panel">
        <h4>📻 SUB-GHz RADIO</h4>
        <label>Frekans Modülasyonu:</label>
        <select id="sub-frequency">
            <option value="433.92">433.92 MHz (Araba / Garaj)</option>
            <option value="315.00">315.00 MHz (Bariyerler)</option>
            <option value="868.35">868.35 MHz (Güvenlikli Kapılar)</option>
        </select>
        <div class="action-grid">
            <button class="ctrl-btn" onclick="runSubGhz('RX')">SİNYAL YAKALA</button>
            <button class="ctrl-btn alert" onclick="runSubGhz('TX')">SİNYAL YAY (TX)</button>
        </div>
    </div>

    <div id="nfc-mod" class="module-panel">
        <h4>💳 NFC & RFID EMULATOR</h4>
        <label>Kart Protokolü:</label>
        <select id="nfc-protocol">
            <option value="Mifare">Mifare Classic 1K (Otobüs/Otel)</option>
            <option value="RFID 125">RFID 125 kHz (Göstergeç)</option>
            <option value="NTAG">NTAG21X (RFID Etiket)</option>
        </select>
        <div class="action-grid">
            <button class="ctrl-btn" onclick="runNFCSys('SCAN')">KART OKU / KOPYALA</button>
            <button class="ctrl-btn alert" onclick="runNFCSys('EMU')">KARTI YAYINLA</button>
        </div>
    </div>

    <div id="key-mod" class="module-panel">
        <h4>🔑 KEY DECODER (PRO)</h4>
        <div class="scale-control-panel">
            <span style="font-size: 11px;">Çizelge Boyutu:</span>
            <button onclick="adjustScale(0.1)">BÜYÜT (+)</button>
            <button onclick="adjustScale(-0.1)">KÜÇÜLT (-)</button>
        </div>
        <div class="decoder-wrapper">
            <div class="key-decoder-visual" id="keyVisual">
                <div class="key-pin-box">
                    <button class="pin-adj-btn" onclick="adjPin(1, 1)">+</button>
                    <div class="key-pin" id="pin1" data-val="0">0</div>
                    <button class="pin-adj-btn" onclick="adjPin(1, -1)">-</button>
                </div>
                <div class="key-pin-box">
                    <button class="pin-adj-btn" onclick="adjPin(2, 1)">+</button>
                    <div class="key-pin" id="pin2" data-val="0">0</div>
                    <button class="pin-adj-btn" onclick="adjPin(2, -1)">-</button>
                </div>
                <div class="key-pin-box">
                    <button class="pin-adj-btn" onclick="adjPin(3, 1)">+</button>
                    <div class="key-pin" id="pin3" data-val="0">0</div>
                    <button class="pin-adj-btn" onclick="adjPin(3, -1)">-</button>
                </div>
                <div class="key-pin-box">
                    <button class="pin-adj-btn" onclick="adjPin(4, 1)">+</button>
                    <div class="key-pin" id="pin4" data-val="0">0</div>
                    <button class="pin-adj-btn" onclick="adjPin(4, -1)">-</button>
                </div>
                <div class="key-pin-box">
                    <button class="pin-adj-btn" onclick="adjPin(5, 1)">+</button>
                    <div class="key-pin" id="pin5" data-val="0">0</div>
                    <button class="pin-adj-btn" onclick="adjPin(5, -1)">-</button>
                </div>
                <div class="key-pin-box">
                    <button class="pin-adj-btn" onclick="adjPin(6, 1)">+</button>
                    <div class="key-pin" id="pin6" data-val="0">0</div>
                    <button class="pin-adj-btn" onclick="adjPin(6, -1)">-</button>
                </div>
            </div>
        </div>
        <div class="action-grid">
            <button class="ctrl-btn" style="grid-column: span 2;" onclick="getFinalKeyData()">AYARLANAN KODU SİSTEME KAYDET</button>
        </div>
    </div>

    <div id="usb-mod" class="module-panel">
        <h4>⌨️ BAD USB SCRIPT GENERATOR</h4>
        <label>Saldırı Senaryosu:</label>
        <select id="usb-payload">
            <option value="WIFI">Kayıtlı Wi-Fi Şifrelerini Göster</option>
            <option value="LOCK">Hedef Bilgisayarı Kilitle</option>
            <option value="FAKE">Sahte Windows Çökme Ekranı Aç</option>
        </select>
        <button class="ctrl-btn" style="width: 100%;" onclick="runBadUSBSys()">PAYLOAD ÜRET</button>
    </div>

    <div id="net-mod" class="module-panel">
        <h4>🌐 NETWORK ANALYZER</h4>
        <label>Yerel Ağ Hedefi / Modem IP:</label>
        <input type="text" id="target-ip" value="192.168.1.1">
        <div class="action-grid">
            <button class="ctrl-btn" onclick="runNetworkSys('PING')">PING TEST</button>
            <button class="ctrl-btn" onclick="runNetworkSys('SCAN')">AĞI TARA</button>
        </div>
    </div>
</div>

<script src="badusb_payloads.js"></script>
<script src="nfc_core.js"></script>
<script src="network_scanner.js"></script>

<script>
    let currentScale = 1.0;

    function changeModule(modId) {
        document.querySelectorAll('.module-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(modId).classList.add('active');
        event.currentTarget.classList.add('active');
        
        printLog(`Modül değiştirildi: ${modId.replace('-mod', '').toUpperCase()}`);
    }

    function printLog(text, isError = false) {
        let container = document.getElementById('displayLogs');
        let row = document.createElement('div');
        row.className = 'terminal-row';
        if(isError) row.style.color = '#ff3333';
        row.innerText = `> ${text}`;
        container.appendChild(row);
        
        let screen = document.getElementById('flipperScreen');
        screen.scrollTop = screen.scrollHeight;
    }

    // --- ENTEGRASYON VE TETİKLEME MOTORLARI ---

    // 1. Harici Bad USB Entegrasyonu
    function runBadUSBSys() {
        let type = document.getElementById('usb-payload').value;
        printLog("Betik derleniyor...");
        setTimeout(() => {
            let scriptData = generateBadUsb(type);
            printLog("DuckyScript üretildi ve panoya kopyalandı!");
        }, 500);
    }

    // 2. Harici NFC Entegrasyonu
    function runNFCSys(mode) {
        let protocol = document.getElementById('nfc-protocol').value;
        if(mode === 'SCAN') {
            printLog(`${protocol} modül taraması başlatılıyor...`);
            startNFCScan(printLog);
        } else if(mode === 'EMU') {
            emulateSavedNFC(printLog);
        }
    }

    // 3. Harici Network Entegrasyonu
    function runNetworkSys(mode) {
        let target = document.getElementById('target-ip').value;
        if(mode === 'PING') {
            printLog(`${target} adresine ping paketi atılıyor...`);
            executePing(target, printLog);
        } else if(mode === 'SCAN') {
            let baseIP = target.substring(0, target.lastIndexOf('.'));
            scanLocalNetwork(baseIP, printLog);
        }
    }

    // 4. Infrared Sistemi tetikleyicisi (Geliştirmeye açık)
    function runIRSystem(action) {
        let brand = document.getElementById('ir-database').value;
        if(action === 'POWER') printLog(`${brand} için kızılötesi kapatma (HEX) fırlatıldı.`);
        if(action === 'MUTE') printLog(`${brand} ses kesme komutu iletildi.`);
        if(action === 'SRC') printLog(`${brand} kaynak seçimi tetiklendi.`);
        if(action === 'RX') printLog("Kızılötesi gözü aktiflendi. Sinyal bekleniyor...");
    }

    // 5. Sub-Ghz Tetikleyicisi
    function runSubGhz(action) {
        let freq = document.getElementById('sub-frequency').value;
        if(action === 'RX') printLog(`${freq} MHz bandı dinleniyor... Sinyal aranıyor...`);
        if(action === 'TX') printLog(`${freq} MHz üzerinden kayıtlı ham veri (RAW) havaya fırlatılıyor!`);
    }

    // --- KEY DECODER FONKSİYONLARI ---
    function adjustScale(amount) {
        currentScale += amount;
        if(currentScale < 0.5) currentScale = 0.5;
        if(currentScale > 2.0) currentScale = 2.0;
        document.getElementById('keyVisual').style.transform = `scale(${currentScale})`;
        printLog(`Ölçek Oranı: %${Math.round(currentScale * 100)}`);
    }

    function adjPin(pinNum, direction) {
        let pin = document.getElementById(`pin${pinNum}`);
        let currentVal = parseInt(pin.getAttribute('data-val'));
        currentVal += direction;
        if(currentVal < 0) currentVal = 0;
        if(currentVal > 9) currentVal = 9;
        
        pin.setAttribute('data-val', currentVal);
        pin.innerText = currentVal;
        pin.style.height = `${15 + (currentVal * 4)}px`;
    }

    function getFinalKeyData() {
        let finalCode = [];
        for(let i = 1; i <= 6; i++) {
            finalCode.push(document.getElementById(`pin${i}`).getAttribute('data-val'));
        }
        printLog(`Anahtar Profili Belleğe Kaydedildi: ${finalCode.join(' ')}`);
    }
</script>

</body>
</html>
